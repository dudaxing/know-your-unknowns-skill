name: Validate Skill

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install validation dependency
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.3

      - name: Check evaluator syntax
        run: python -m py_compile evals/reduce-critical-unknowns/run_static_checks.py

      - name: Validate Skill and eval corpus
        run: python evals/reduce-critical-unknowns/run_static_checks.py
